name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Unit tests
        run: python3 -m unittest discover tests -v

      - name: Integration tests
        run: bash tests/test-hook.sh

      - name: Eval gate
        run: python3 tests/eval/run_eval.py

      - name: Docs parity
        run: python3 scripts/sync_docs.py --check
