name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Unit tests
        run: python3 -m unittest tests/test_config.py -v

      - name: Integration tests
        run: bash tests/test-hook.sh
